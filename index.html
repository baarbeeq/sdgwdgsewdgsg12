<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supabase Профиль</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f7f6;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 50px;
      margin: 0;
    }

    /* Стили для карточек */
    .card {
      background-color: white;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
      width: 400px;
      margin-bottom: 30px;
    }

    h2 {
      margin-top: 0;
      margin-bottom: 15px;
      font-weight: 700;
      color: #333;
    }

    #myInfo {
      color: #555;
      font-size: 1.1em;
      margin-bottom: 25px;
    }

    /* Сетка кнопок */
    .button-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .btn {
      border: none;
      border-radius: 10px;
      padding: 15px;
      font-size: 1.2em;
      color: white;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: background-color 0.2s, transform 0.1s;
    }

    .btn:active {
      transform: scale(0.98);
    }

    /* Конкретные стили для каждой кнопки */
    .btn.study { background-color: #28a745; }
    .btn.study:hover { background-color: #218838; }

    .btn.coffee { background-color: #ffc107; color: black; }
    .btn.coffee:hover { background-color: #e0a800; }

    .btn.gaming { background-color: #17a2b8; }
    .btn.gaming:hover { background-color: #138496; }

    .btn.home { background-color: #6c757d; }
    .btn.home:hover { background-color: #5a6268; }

    /* Стили для списка монитора группы */
    .user-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .user-item {
      display: flex;
      align-items: center;
      padding: 15px 0;
      border-bottom: 1px solid #eee;
    }

    .user-item:last-child {
      border-bottom: none;
    }

    .status-dot {
      width: 15px;
      height: 15px;
      border-radius: 50%;
      margin-right: 15px;
      background-color: #ccc; /* Цвет по умолчанию */
    }

    .user-details {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
    }

    .user-name strong {
      font-size: 1.1em;
      color: #333;
    }

    .user-status {
      display: flex;
      align-items: center;
      gap: 5px;
      color: #777;
    }

    .user-status small {
      font-size: 0.9em;
    }

  </style>
</head>
<body>

  <div class="card">
    <h2>Мой профиль</h2>
    <p id="myInfo">Загрузка имени...</p>

    <div class="button-group">
      <button class="btn study" onclick="window.changeStatus('Учусь', '#28a745')">
        📚 Учусь
      </button>
      <button class="btn coffee" onclick="window.changeStatus('Кофе-брейк', '#ffc107')">
        ☕ Кофе
      </button>
      <button class="btn gaming" onclick="window.changeStatus('В игре', '#17a2b8')">
        🎮 В игре
      </button>
      <button class="btn home" onclick="window.changeStatus('Дома', '#6c757d')">
        🏠 Дома
      </button>
    </div>
  </div>

  <div class="card">
    <h2>Монитор группы</h2>
    <ul id="groupList" class="user-list">
      </ul>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    // Конфигурация Supabase
    const URL = 'https://ywzjjhufqfstzkvlejnn.supabase.co';
    const KEY = 'sb_publishable_6HjkxMHqF-bt1DXeUe3N0Q_6aLg10sC';
    const supabase = createClient(URL, KEY);

    // Ваш ID для тестирования (тот, что на скриншоте)
    const MY_ID = '0d4fd120-4620-4d2b-b69c-52be85deaf7c';

    // Вспомогательная функция для получения смайлика статуса
    const getStatusEmoji = (statusText) => {
      if (!statusText) return '';
      const lowerText = statusText.toLowerCase();
      if (lowerText.includes('учусь')) return '📚';
      if (lowerText.includes('кофе')) return '☕';
      if (lowerText.includes('игре')) return '🎮';
      if (lowerText.includes('дома')) return '🏠';
      return '';
    };

    // Функция смены статуса (доступна глобально через window)
    window.changeStatus = async (text, color) => {
      const { error } = await supabase
        .from('profiles')
        .update({ status: text, color: color })
        .eq('id', MY_ID);

      if (error) {
        alert("Ошибка! Проверьте RLS политики в Supabase.");
        console.error(error);
      } else {
        fetchGroup(); // Сразу обновляем список
      }
    };

    // Функция получения данных группы
    async function fetchGroup() {
      const { data, error } = await supabase
        .from('profiles')
        .select('*')
        .order('username', { ascending: true });

      if (error) return console.error(error);

      // Отрисовка списка пользователей
      const list = document.getElementById('groupList');
      if (list) {
        list.innerHTML = data.map(user => `
          <li class="user-item">
            <div class="status-dot" style="background: ${user.color || '#ccc'}"></div>
            <div class="user-details">
              <span class="user-name"><strong>${user.username}</strong></span>
              <span class="user-status">
                ${getStatusEmoji(user.status)} <small>${user.status || 'Статус не задан'}</small>
              </span>
            </div>
          </li>
        `).join('');
      }

      // Обновление информации о текущем пользователе
      const me = data.find(u => u.id === MY_ID);
      if (me) {
        const myInfo = document.getElementById('myInfo');
        if (myInfo) myInfo.innerText = `Вы зашли как: ${me.username}`;
      }
    }

    // Первоначальный вызов и запуск обновления каждые 5 секунд
    fetchGroup();
    setInterval(fetchGroup, 5000);
  </script>

</body>
</html>
